name: PCSX2 Silvermont Build (N3170)

on:
  workflow_dispatch: # Permite que você inicie a compilação manualmente

jobs:
  build_linux:
    runs-on: ubuntu-24.04 # Versão mais nova para ter SDL3 e Qt6 nativos
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ccache curl \
            libaio-dev libasound2-dev libbz2-dev libegl1-mesa-dev \
            libgl1-mesa-dev libgles2-mesa-dev libjack-jackd2-dev \
            liblzma-dev libpcap-dev libpng-dev libpulse-dev \
            libsdl2-dev libsoundtouch-dev libspeexdsp-dev \
            libudev-dev libvorbis-dev libvulkan-dev libwayland-dev \
            libx11-dev libx11-xcb-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxi-dev libxrandr-dev libxxf86vm-dev \
            libxml2-dev nlohmann-json3-dev qt6-base-dev \
            qt6-base-private-dev qt6-tools-dev qt6-tools-dev-tools \
            libqt6svg6-dev qt6-l10n-tools qt6-shader-tools \
            libavcodec-dev libavformat-dev libswresample-dev libswscale-dev \
            libchdr-dev libzstd-dev libcurl4-openssl-dev

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-march=silvermont -mtune=silvermont -O3" \
            -DCMAKE_CXX_FLAGS="-march=silvermont -mtune=silvermont -O3" \
            -DENABLE_AVX=OFF \
            -DENABLE_AVX2=OFF \
            -DUSE_VULKAN=ON \
            -DPERFORMANCE_BUILD=ON \
            -DUSE_DRC=ON \
            -DQT_BUILD=ON

      - name: Build
        run: cmake --build build -j $(nproc)

      - name: Package Artifact
        run: |
          mkdir release
          cp -r build/bin/* release/
          tar -czvf pcsx2-silvermont-n3170.tar.gz release/

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: pcsx2-silvermont-binaries
          path: pcsx2-silvermont-n3170.tar.gz
